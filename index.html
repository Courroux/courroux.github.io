<!DOCTYPE html>
<html>
    <head>
        <title>Cadastre 1825</title>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin=""></script>
        <style type="text/css">
            body {
                margin: 0;
                padding: 0;
            }
            html, body, #map{
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
    <div id="map"></div>
        <script>
            var map = L.map('map', {attributionControl: false}).setView([46.9795, -0.2947], 13);
            L.control.attribution({prefix: false}).addTo(map);
            var osmLayer = L.tileLayer(
                'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                {
                    minZoom: 13,
                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }
            ).addTo(map);

            var geopfPhotoLayer = L.tileLayer.wms(
                'https://data.geopf.fr/wms-r/wms?VERSION%3D1.3.0',
                {
                    layers: 'ORTHOIMAGERY.ORTHOPHOTOS',
                    tiled: "true",
                    version: "1.3.0",
                    attribution: '<a href="http://www.ign.fr"/>IGN</a>',
                }
            )

            var geopfPhoto5065Layer = L.tileLayer.wms(
                'https://data.geopf.fr/wms-r/wms?VERSION%3D1.3.0',
                {
                    layers: 'ORTHOIMAGERY.ORTHOPHOTOS.1950-1965',
                    format: 'image/png',
                    tiled: "true",
                    version: "1.3.0",
                    attribution: '<a href="http://www.ign.fr"/>IGN</a>',
                }
            )

            var cadastreLayer = L.tileLayer(
                './{z}/{x}/{y}.png',
                {
                    minZoom: 13,
                    maxZoom: 19,
                    tms: false,
                    attribution: '<a href="https://archives-deux-sevres-vienne.fr/">Archives 79-86</a>, Created by QGIS'
                }).addTo(map);

            var baseMaps = {
                "OpenStreetMap": osmLayer,
                'Photos actuelles':geopfPhotoLayer,
                'Photos 1950-1965':geopfPhoto5065Layer,
            };

            var overlayCadastre = {
                "Cadastre de 1825": cadastreLayer,
            };
            var layerControl = L.control.layers(baseMaps, overlayCadastre).addTo(map);
        </script>
    </body>
</html>
